# TODO Merge the two docker compose files
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:17
    container_name: fmz_tracker_postgres
    expose:
      - 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - postgres.env
    restart: always
    logging: *default-logging

  rabbitmq:
    image: rabbitmq:3.12
    container_name: fmz_tracker_rabbitmq
    expose:
      - 5672
    env_file:
      - rabbitmq.env
    restart: always
    logging: *default-logging

  django:
    container_name: fmz_tracker_django
    build:
      dockerfile: docker/Dockerfile
      target: django
    expose:
      - 8000
    env_file:
      - postgres.env
      - rabbitmq.env
      - django.env
    depends_on:
      - postgres
      - discord
    restart: always
    logging: *default-logging

  discord:
    container_name: fmz_tracker_discord
    build:
      dockerfile: docker/discord/Dockerfile
    expose:
      - 5000
    ports:
      - 5000:5000
    env_file:
      - discord.env
    restart: always
    logging: *default-logging

  celery_default:
    container_name: fmz_tracker_celery_default
    build:
      dockerfile: docker/Dockerfile
      target: django
    env_file:
      - postgres.env
      - rabbitmq.env
      - django.env
    depends_on:
      - rabbitmq
      - postgres
      - django
    command:
      - python
      - -m
      - celery
      - -A
      - tracker
      - worker
      - --loglevel=INFO
      - --beat
      - -Q
      - default
    restart: always
    logging: *default-logging

  celery_mv:
    container_name: fmz_tracker_celery_mv
    build:
      dockerfile: docker/Dockerfile
      target: django
    env_file:
      - postgres.env
      - rabbitmq.env
      - django.env
    depends_on:
      - rabbitmq
      - postgres
      - django
    command:
      - python
      - -m
      - celery
      - -A
      - tracker
      - worker
      - --loglevel=INFO
      - -Q
      - mv
    restart: always
    logging: *default-logging

  nginx:
    container_name: fmz_tracker_nginx
    build:
      dockerfile: docker/Dockerfile
      target: nginx
    ports:
      - 8080:8080
    depends_on:
      - django
    restart: always
    logging: *default-logging

volumes:
  postgres_data:
